<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Analyst</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Sales Analyst</h1>
    <div class="status">
      <span id="connection-status" class="status-dot offline"></span>
      <span id="status-text">Waiting for API...</span>
    </div>
  </header>

  <main>
    <section class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Total Sales</span>
        <span class="stat-value" id="total-sales">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Orders Today</span>
        <span class="stat-value" id="orders-today">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Revenue</span>
        <span class="stat-value" id="revenue">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Top Product</span>
        <span class="stat-value" id="top-product">--</span>
      </div>
    </section>

    <section class="sales-table-container">
      <h2>Live Sales</h2>
      <table id="sales-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="sales-body">
          <tr class="empty-row">
            <td colspan="5">No sales data yet. Connect your API to get started.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
